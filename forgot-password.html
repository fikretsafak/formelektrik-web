<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Şifremi Unuttum — Form Elektrik</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="/assets/main/favicon.png" />
<link rel="apple-touch-icon" href="/assets/main/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
<style>
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; position: relative; z-index: 1; }
  .login-card {
    width: 100%; max-width: 460px;
    background: linear-gradient(180deg, var(--surface), var(--bg-soft));
    border: 1px solid var(--line-2);
    border-radius: var(--radius);
    padding: 44px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }
  .login-logo { display: flex; justify-content: center; margin-bottom: 24px; }
  .login-logo img { height: 40px; }
  .login-logo .brand-fallback { font-family: var(--font-head); font-weight: 700; font-size: 1.5rem; }
  .login-logo .brand-fallback b { color: var(--cyan); }
  .login-card h1 { font-family: var(--font-head); font-size: 24px; text-align: center; margin-bottom: 8px; }
  .login-card p.lead { text-align: center; color: var(--text-soft); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  .login-form { display: flex; flex-direction: column; gap: 16px; }
  .login-form .field > span { display:block; font-size:.85rem; color:var(--text-soft); margin-bottom:7px; font-weight:500; }
  .login-form input { width:100%; background:var(--bg-soft); border:1px solid var(--line-2); border-radius:var(--radius-sm); padding:13px 15px; color:var(--text); font-size:.95rem; font-family:var(--font); transition:border-color .15s, box-shadow .15s; }
  .login-form input:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px color-mix(in srgb, var(--cyan) 18%, transparent); }
  .login-form .btn { width: 100%; justify-content: center; padding: 14px; }
  .login-foot { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-faint); }
  .login-foot a { color: var(--cyan); }
  .form-status { font-size:.9rem; line-height:1.6; }
  .form-status.is-error { color:#f87171; }
  .form-status.is-success { color:var(--ok); }
</style>
<!-- Rybbit Analytics -->
<script src="https://analytics.enerjione.com/api/script.js" data-site-id="8d1bda3b72d3" defer></script>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/main/logo.png" alt="Form Elektrik" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="brand-fallback" style="display:none">Form<b>Elektrik</b></span>
    </div>
    <h1>Şifremi Unuttum</h1>
    <p class="lead">Yönetim paneline kayıtlı e-posta adresinizi girin, şifre sıfırlama bağlantısını size gönderelim.</p>

    <form class="login-form" id="forgotForm">
      <label class="field">
        <span>E-posta</span>
        <input type="email" name="email" required autocomplete="email" autofocus placeholder="ornek@formelektrik.com" />
      </label>
      <div class="form-status" id="forgotStatus"></div>
      <button type="submit" class="btn btn-primary" id="forgotBtn">Sıfırlama Bağlantısı Gönder</button>
    </form>

    <div class="login-foot">
      <a href="/login.html">← Giriş sayfasına dön</a>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('forgotForm');
const statusEl = document.getElementById('forgotStatus');
const btn = document.getElementById('forgotBtn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  statusEl.className = 'form-status';
  statusEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';

  const fd = new FormData(form);
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: fd.get('email') }),
    });
    // Backend her durumda { ok: true } döner (bilgi sızıntısı önleme)
    statusEl.className = 'form-status is-success';
    statusEl.innerHTML = '✓ E-posta adresiniz sistemde kayıtlıysa, şifre sıfırlama bağlantısı az önce gönderildi.<br><br><b>Bağlantı 1 saat süreyle geçerlidir.</b> Spam klasörünüzü de kontrol etmeyi unutmayın.';
    form.reset();
    btn.disabled = true;
    btn.textContent = 'Gönderildi';
  } catch (err) {
    statusEl.className = 'form-status is-error';
    statusEl.textContent = 'Bir hata oluştu. Lütfen tekrar deneyin.';
    btn.disabled = false;
    btn.textContent = 'Sıfırlama Bağlantısı Gönder';
  }
});
</script>

</body>
</html>
