# ============================================================
# Form Elektrik — ana site (Node.js Express, port 3000)
# /etc/nginx/sites-available/formelektrik.com
# ============================================================
#
# Bu config 'formelektrik.com' ana domain için Node.js sunucusuna proxy yapar.
# Alt domain'ler (grid.formelektrik.com, solar.formelektrik.com vb.) için ayrı
# config dosyaları kullanılır — infra/nginx/grid.formelektrik.com.conf,
# infra/nginx/solar.formelektrik.com.conf
#
# Sertifika için: sudo certbot --nginx -d formelektrik.com -d www.formelektrik.com

upstream formelektrik_site {
    server 127.0.0.1:3000;
    keepalive 16;
}

# WebSocket / SSE upgrade map (gelecekte gerekirse hazır)
map $http_upgrade $formelektrik_connection_upgrade {
    default upgrade;
    '' close;
}

# HTTP — Let's Encrypt challenge için açık + HTTPS'e yönlendir
server {
    listen 80;
    listen [::]:80;
    server_name formelektrik.com www.formelektrik.com;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://formelektrik.com$request_uri;
    }
}

# HTTPS — ana site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name formelektrik.com;

    # Sertifika dosyaları (certbot otomatik dolduracak)
    ssl_certificate     /etc/letsencrypt/live/formelektrik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formelektrik.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload limit (demo form vs. ileride dosya yüklemeleri için)
    client_max_body_size 50M;

    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 30s;
    proxy_buffering off;

    access_log /var/log/nginx/formelektrik.com.access.log;
    error_log  /var/log/nginx/formelektrik.com.error.log warn;

    # gzip — Node yapmasın diye burada
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Not: Rybbit Analytics artık ayrı subdomain'de (analytics.formelektrik.com).
    # Bkz. infra/nginx/analytics.formelektrik.com.conf — burada subpath bloğu yok.

    # Statik dosya kökü (install.sh hedefi). nginx asset/video/upload'ları
    # doğrudan diskten servis eder — node/Express'e uğramaz.
    root /opt/formelektrik-web;

    # Video/asset/upload — nginx native servis (range/seek destekli, hızlı).
    # Express'ten geçmediği için hero videoları anında akar.
    location ~* ^/(assets|uploads)/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri @node;   # dosya yoksa node'a düş (örn. dinamik upload yolu)
    }

    # Büyük binary'lere gzip uygulama (mp4 zaten sıkışık — CPU israfı + bozulma riski)
    location ~* \.(mp4|webm|jpg|jpeg|png|webp|avif|woff2?|ico)$ {
        root /opt/formelektrik-web;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri @node;
    }

    location / {
        proxy_pass http://formelektrik_site;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $formelektrik_connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Statik try_files fallback hedefi — dosya diskte yoksa node'a proxy
    location @node {
        proxy_pass http://formelektrik_site;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}

# HTTPS — www. yönlendirme
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.formelektrik.com;

    ssl_certificate     /etc/letsencrypt/live/formelektrik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formelektrik.com/privkey.pem;

    return 301 https://formelektrik.com$request_uri;
}
