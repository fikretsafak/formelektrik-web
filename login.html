<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yönetim Paneli Girişi — Form Elektrik</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="/assets/main/favicon.png" />
<link rel="apple-touch-icon" href="/assets/main/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
<style>
  body { background: #070c22; color: #eef4ff; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 18% 18%, rgba(42,169,224,0.22), transparent 32%), radial-gradient(circle at 82% 12%, rgba(63,184,239,0.14), transparent 28%), linear-gradient(135deg, #070c22 0%, #111a4d 52%, #070c22 100%); pointer-events: none; }
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; position: relative; z-index: 1; }
  .login-card {
    width: 100%; max-width: 460px;
    background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.045));
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 28px;
    padding: 46px;
    box-shadow: 0 34px 90px rgba(0,0,0,0.48);
    backdrop-filter: blur(18px);
  }
  .login-logo { display: flex; justify-content: center; align-items:center; gap: 12px; margin-bottom: 26px; }
  .login-logo img { width: 46px; height: 46px; object-fit: contain; filter: drop-shadow(0 12px 24px rgba(42,169,224,.28)); }
  .brand-wordmark { font-family: var(--font-head); font-weight: 700; font-size: 1.8rem; letter-spacing: -0.01em; line-height: 1; }
  .brand-wordmark b { color: #fff; font-weight: 700; }
  .brand-wordmark i { color: var(--cyan-2); font-style: normal; font-weight: 500; }
  .login-card h1 { font-family: var(--font-head); font-size: 25px; text-align: center; margin-bottom: 8px; color:#fff; }
  .login-card .sub { text-align: center; color: rgba(234,240,255,0.72); font-size: 14px; margin-bottom: 28px; }
  .login-form { display: flex; flex-direction: column; gap: 16px; }
  .login-form .field { margin-bottom: 0; }
  .login-form .field > span { display:block; font-size:.85rem; color:rgba(234,240,255,0.78); margin-bottom:7px; font-weight:600; }
  .login-form input { width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:var(--radius-sm); padding:13px 15px; color:#fff; font-size:.95rem; font-family:var(--font); transition:border-color .15s, box-shadow .15s, background .15s; }
  .login-form input:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(42,169,224,0.22); background:rgba(255,255,255,0.12); }
  .login-form .btn { width: 100%; justify-content: center; padding: 14px; margin-top: 4px; }
  .login-foot { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(234,240,255,0.62); }
  .login-foot a { color: var(--cyan-2); }
  .form-status { font-size:.9rem; padding:0; }
  .form-status.is-error { color:#fca5a5; }
  .form-status.is-success { color:#86efac; }
  /* Şifre alanı + göster/gizle */
  .pwd-wrap { position: relative; display: flex; }
  .pwd-wrap input { width: 100%; padding-right: 46px; }
  .pwd-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 34px; height: 34px; border: none; background: transparent;
    color: var(--text-faint); cursor: pointer; display: flex;
    align-items: center; justify-content: center; border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .pwd-toggle:hover { color: var(--cyan); background: rgba(255,255,255,0.1); }
  /* Beni hatırla satırı */
  .login-options { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: rgba(234,240,255,0.72); user-select: none; }
  .remember-me input { width: 16px; height: 16px; accent-color: var(--cyan); cursor: pointer; }
  .login-options a { font-size: 13px; color: var(--cyan-2); }
  .login-lang .lang-toggle button { color:#fff; }
  @media (max-width: 520px) { .login-card { padding: 34px 24px; border-radius: 22px; } .brand-wordmark { font-size: 1.7rem; } }
  /* Dil seçici */
  .login-lang { position: fixed; top: 20px; right: 20px; z-index: 2; }
</style>
<script>
  (() => { document.documentElement.lang = localStorage.getItem('fe-lang') || 'tr'; })();
</script>
<!-- Rybbit Analytics -->
<script src="https://analytics.enerjione.com/api/script.js" data-site-id="8d1bda3b72d3" defer></script>
</head>
<body>

<div class="login-lang">
  <div class="lang-toggle" id="langToggle">
    <button data-lang="tr" class="active" title="Türkçe" aria-label="Türkçe">
      <svg viewBox="0 0 60 40" preserveAspectRatio="xMidYMid slice"><rect width="60" height="40" fill="#E30A17"/><circle cx="26" cy="20" r="9" fill="#fff"/><circle cx="29" cy="20" r="7.2" fill="#E30A17"/><polygon points="40,20 33,22.3 37.3,16.4 37.3,23.6 33,17.7" fill="#fff"/></svg>
    </button>
    <button data-lang="en" title="English" aria-label="English">
      <svg viewBox="0 0 60 40" preserveAspectRatio="xMidYMid slice"><clipPath id="uk-h"><rect width="60" height="40"/></clipPath><rect width="60" height="40" fill="#012169"/><g clip-path="url(#uk-h)"><path d="M0,0 L60,40 M60,0 L0,40" stroke="#fff" stroke-width="8"/><path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V40 M0,20 H60" stroke="#fff" stroke-width="12"/><path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="7"/></g></svg>
    </button>
  </div>
</div>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/main/logo-icon.png" alt="Form Elektrik" />
      <span class="brand-wordmark"><b>form</b><i>elektrik</i></span>
    </div>
    <h1 data-i18n="login.title">Yönetim Paneli Girişi</h1>
    <p class="sub" data-i18n="login.sub">Devam etmek için giriş yapın.</p>

    <form class="login-form" id="loginForm">
      <label class="field">
        <span data-i18n="login.email">E-posta</span>
        <input type="email" name="email" required autocomplete="email" autofocus />
      </label>
      <label class="field">
        <span data-i18n="login.password">Şifre</span>
        <div class="pwd-wrap">
          <input type="password" name="password" id="loginPwd" required autocomplete="current-password" minlength="6" />
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Şifreyi göster" title="Şifreyi göster">
            <svg class="eye-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </label>
      <div class="login-options">
        <label class="remember-me">
          <input type="checkbox" name="remember" id="rememberMe" checked />
          <span data-i18n="login.remember">Beni hatırla</span>
        </label>
        <a href="/forgot-password.html" data-i18n="login.forgot">Şifremi unuttum</a>
      </div>
      <div class="form-status" id="loginStatus"></div>
      <button type="submit" class="btn btn-primary" id="loginBtn" data-i18n="login.submit">Giriş Yap</button>
    </form>

    <div class="login-foot">
      <a href="/" data-i18n="login.back">← Ana sayfaya dön</a>
    </div>
  </div>
</div>

<script>
// ===== i18n + dil seçici =====
const LOGIN_I18N = {
  tr: { 'login.title': 'Yönetim Paneli Girişi', 'login.sub': 'Devam etmek için giriş yapın.', 'login.email': 'E-posta', 'login.password': 'Şifre', 'login.remember': 'Beni hatırla', 'login.forgot': 'Şifremi unuttum', 'login.submit': 'Giriş Yap', 'login.back': '← Ana sayfaya dön' },
  en: { 'login.title': 'Admin Panel Login', 'login.sub': 'Sign in to continue.', 'login.email': 'Email', 'login.password': 'Password', 'login.remember': 'Remember me', 'login.forgot': 'Forgot password', 'login.submit': 'Sign In', 'login.back': '← Back to home' },
};
let LANG = localStorage.getItem('fe-lang') || 'tr';
if (!LOGIN_I18N[LANG]) LANG = 'tr';
(() => {
  const dict = LOGIN_I18N[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = dict[el.getAttribute('data-i18n')];
    if (v) el.textContent = v;
  });
  document.querySelectorAll('#langToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === LANG);
    b.addEventListener('click', () => { localStorage.setItem('fe-lang', b.dataset.lang); location.reload(); });
  });
})();

const form = document.getElementById('loginForm');
const statusEl = document.getElementById('loginStatus');
const btn = document.getElementById('loginBtn');

// Şifre göster/gizle
const pwd = document.getElementById('loginPwd');
const pwdToggle = document.getElementById('pwdToggle');
pwdToggle.addEventListener('click', () => {
  const show = pwd.type === 'password';
  pwd.type = show ? 'text' : 'password';
  pwdToggle.querySelector('.eye-show').style.display = show ? 'none' : '';
  pwdToggle.querySelector('.eye-hide').style.display = show ? '' : 'none';
  pwdToggle.setAttribute('aria-label', show ? 'Şifreyi gizle' : 'Şifreyi göster');
  pwdToggle.title = show ? 'Şifreyi gizle' : 'Şifreyi göster';
});

// Zaten geçerli oturum varsa doğrudan panele yönlendir (flash önleme)
const loginPage = document.getElementById('loginPage');
const tok = localStorage.getItem('e1-token') || sessionStorage.getItem('e1-token');
if (tok) {
  loginPage.style.display = 'none';
  (async () => {
    try {
      const res = await fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + tok },
        credentials: 'include',
      });
      if (res.ok) {
        const data = await res.json();
        location.href = data.user.role === 'admin' ? '/admin/' : '/account/';
        return;
      }
    } catch {}
    loginPage.style.display = '';
  })();
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  statusEl.className = 'form-status';
  statusEl.textContent = '';
  btn.disabled = true;
  btn.textContent = LANG === 'en' ? 'Signing in…' : 'Giriş yapılıyor…';

  const fd = new FormData(form);
  const remember = document.getElementById('rememberMe').checked;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
    });
    const data = await res.json();
    if (!res.ok) { const e = new Error(data.error || 'invalid'); e.retryAfter = data.retry_after; throw e; }
    // Beni hatırla: kalıcı (localStorage) — değilse sadece bu oturum (sessionStorage)
    const store = remember ? localStorage : sessionStorage;
    (remember ? sessionStorage : localStorage).removeItem('e1-token');
    (remember ? sessionStorage : localStorage).removeItem('e1-user');
    store.setItem('e1-token', data.token);
    store.setItem('e1-user', JSON.stringify(data.user));
    location.href = data.user.role === 'admin' ? '/admin/' : '/account/';
  } catch (err) {
    statusEl.className = 'form-status is-error';
    const mins = err.retryAfter ? Math.ceil(err.retryAfter / 60) : 15;
    if (err.message === 'account_locked') {
      statusEl.textContent = LANG === 'en'
        ? `Account temporarily locked due to too many failed attempts. Try again in ${mins} minutes.`
        : `Çok fazla hatalı deneme nedeniyle hesap geçici olarak kilitlendi. ${mins} dakika sonra tekrar deneyin.`;
    } else if (err.message === 'too_many_attempts') {
      statusEl.textContent = LANG === 'en'
        ? 'Too many failed attempts. Please try again in 15 minutes.'
        : 'Çok fazla başarısız giriş. Lütfen 15 dakika sonra deneyin.';
    } else {
      statusEl.textContent = LANG === 'en' ? 'Invalid email or password.' : 'E-posta veya şifre hatalı.';
    }
    btn.disabled = false;
    btn.textContent = LOGIN_I18N[LANG]['login.submit'];
  }
});
</script>

</body>
</html>
